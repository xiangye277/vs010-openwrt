name: Build VS010 OpenWrt 科学版

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout patches
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-distutils rsync swig unzip zlib1g-dev \
            file wget quilt time

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 --single-branch https://github.com/openwrt/openwrt.git
        timeout-minutes: 10

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update packages luci routing
        timeout-minutes: 10

      - name: Install feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a -p packages
          ./scripts/feeds install -a -p luci
          ./scripts/feeds install -a -p routing
        timeout-minutes: 5

      - name: Apply VS010 patches
        run: |
          cp ipq5018-vs010.dts openwrt/target/linux/qualcommax/dts/
          cd openwrt
          cat >> target/linux/qualcommax/image/ipq50xx.mk << 'MKEOF'

          define Device/unicom_vs010
          	$(call Device/FitImageLzma)
          	$(call Device/UbiFit)
          	DEVICE_VENDOR := Unicom
          	DEVICE_MODEL := VS010
          	DEVICE_DTS_CONFIG := config@mp02.1
          	SOC := ipq5018
          	BLOCKSIZE := 128k
          	PAGESIZE := 2048
          	IMAGE_SIZE := 59392k
          	NAND_SIZE := 128m
          	IMAGES += factory.img
          	IMAGE/factory.img := append-ubi | qsdk-ipq-factory-nand
          	DEVICE_PACKAGES := ath11k-firmware-ipq5018-qcn6122 \
          		luci \
          		luci-i18n-base-zh-cn \
          		luci-i18n-firewall-zh-cn \
          		luci-i18n-opkg-zh-cn \
          		luci-i18n-smartdns-zh-cn \
          		dropbear \
          		openssh-sftp-server \
          		dnsmasq-full \
          		smartdns \
          		luci-app-smartdns \
          		https-dns-proxy \
          				luci-app-https-dns-proxy \
          					luci-app-adblock \
          					luci-app-sqm \
          					adblock \
          					sqm-scripts \
          					wireguard-tools \
          		luci-proto-wireguard \
          		kmod-wireguard \
          		curl \
          		wget-ssl \
          		iperf3 \
          		htop \
          		nano
          endef
          TARGET_DEVICES += unicom_vs010
          MKEOF

          # ── uci-defaults: 首次启动配置 ──
          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-vs010-ssh << 'UCIEOF'
          #!/bin/sh
          uci set dropbear.@dropbear[0].enable='1'
          uci set dropbear.@dropbear[0].Port='22'
          uci set dropbear.@dropbear[0].PasswordAuth='on'
          uci set dropbear.@dropbear[0].RootPasswordAuth='on'
          uci commit dropbear
          UCIEOF

          cat > files/etc/uci-defaults/99-vs010-system << 'UCIEOF'
          #!/bin/sh
          uci set system.@system[0].timezone='CST-8'
          uci set system.@system[0].zonename='Asia/Shanghai'
          uci set system.@system[0].hostname='VS010'
          uci commit system
          UCIEOF

          cat > files/etc/uci-defaults/99-vs010-smartdns << 'UCIEOF'
          #!/bin/sh
          # SmartDNS 预配置：国内组走 119.29.29.29/223.5.5.5，国外组走 8.8.8.8/1.1.1.1
          uci set smartdns.@smartdns[0].enabled='1'
          uci set smartdns.@smartdns[0].port='6053'
          uci set smartdns.@smartdns[0].cache_size='4096'
          uci set smartdns.@smartdns[0].rr_ttl_min='300'
          uci set smartdns.@smartdns[0].serve_expired='1'
          uci set smartdns.@smartdns[0].dualstack_ip_selection='1'
          uci add smartdns server
          uci set smartdns.@server[-1].name='domestic-119'
          uci set smartdns.@server[-1].ip='119.29.29.29'
          uci set smartdns.@server[-1].type='udp'
          uci set smartdns.@server[-1].group='domestic'
          uci add smartdns server
          uci set smartdns.@server[-1].name='domestic-223'
          uci set smartdns.@server[-1].ip='223.5.5.5'
          uci set smartdns.@server[-1].type='udp'
          uci set smartdns.@server[-1].group='domestic'
          uci add smartdns server
          uci set smartdns.@server[-1].name='foreign-google'
          uci set smartdns.@server[-1].ip='8.8.8.8'
          uci set smartdns.@server[-1].type='udp'
          uci set smartdns.@server[-1].group='foreign'
          uci add smartdns server
          uci set smartdns.@server[-1].name='foreign-cloudflare'
          uci set smartdns.@server[-1].ip='1.1.1.1'
          uci set smartdns.@server[-1].type='udp'
          uci set smartdns.@server[-1].group='foreign'
          uci commit smartdns
          /etc/init.d/smartdns enable
          UCIEOF

          cat > files/etc/uci-defaults/99-vs010-dnsmasq << 'UCIEOF'
          #!/bin/sh
          # dnsmasq 上游指向 SmartDNS
          uci add_list dhcp.@dnsmasq[0].server='127.0.0.1#6053'
          uci set dhcp.@dnsmasq[0].noresolv='1'
          uci commit dhcp
          /etc/init.d/dnsmasq restart 2>/dev/null || true
          UCIEOF

          chmod +x files/etc/uci-defaults/99-vs010-*
          # ── end uci-defaults ──

          sed -i '/^[[:space:]]*cmcc,mr3000d-ci/i\\tunicom,vs010|\\' target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_unicom_vs010=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_ATH11K_MEM_PROFILE_256M=y
          EOF
          make defconfig

      - name: Build OpenWrt
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: vs010-openwrt-firmware
          path: |
            openwrt/bin/targets/qualcommax/ipq50xx/*vs010*
            openwrt/build.log

      - name: Show build summary
        if: always()
        run: |
          echo "=== Build Result ==="
          ls -lh openwrt/bin/targets/qualcommax/ipq50xx/*vs010* 2>/dev/null || echo "No firmware found"
          echo "=== Build Log (last 50 lines) ==="
          tail -50 openwrt/build.log 2>/dev/null || echo "No build log"
