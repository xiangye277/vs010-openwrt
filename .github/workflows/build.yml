name: Build VS010 OpenWrt

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout patches
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-distutils rsync swig unzip zlib1g-dev \
            file wget quilt time

      - name: Cache OpenWrt source
        uses: actions/cache@v4
        with:
          path: openwrt
          key: openwrt-main-${{ github.run_id }}
          restore-keys: openwrt-main-

      - name: Clone OpenWrt
        run: |
          if [ ! -d openwrt/.git ]; then
            git clone --depth=1 https://github.com/openwrt/openwrt.git
          fi
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply VS010 patches
        run: |
          # Copy DTS
          cp ipq5018-vs010.dts openwrt/target/linux/qualcommax/dts/
          
          # Patch image Makefile - add VS010 device definition
          cd openwrt
          cat >> target/linux/qualcommax/image/ipq50xx.mk << 'MKEOF'

          define Device/unicom_vs010
          	$(call Device/FitImageLzma)
          	$(call Device/UbiFit)
          	DEVICE_VENDOR := Unicom
          	DEVICE_MODEL := VS010
          	DEVICE_DTS_CONFIG := config@mp02.1
          	SOC := ipq5018
          	BLOCKSIZE := 128k
          	PAGESIZE := 2048
          	IMAGE_SIZE := 59392k
          	NAND_SIZE := 128m
          	IMAGES += factory.img
          	IMAGE/factory.img := append-ubi | qsdk-ipq-factory-nand
          	DEVICE_PACKAGES := ath11k-firmware-ipq5018-qcn6122 \
          		luci \
          		luci-i18n-base-zh-cn \
          		luci-i18n-firewall-zh-cn \
          		luci-i18n-opkg-zh-cn \
          		dropbear \
          		openssh-sftp-server \
          		curl \
          		iperf3 \
          		htop
          	endef
          	TARGET_DEVICES += unicom_vs010
          	MKEOF

          	# Create uci-defaults script for first-boot customization
          	mkdir -p files/etc/uci-defaults
          	cat > files/etc/uci-defaults/99-vs010-custom << 'UCIEOF'
          	#!/bin/sh
          	# VS010 default configuration - runs once on first boot

          	# Enable SSH by default
          	uci set dropbear.@dropbear[0].enable='1'
          	uci set dropbear.@dropbear[0].Port='22'
          	uci set dropbear.@dropbear[0].PasswordAuth='on'
          	uci set dropbear.@dropbear[0].RootPasswordAuth='on'
          	uci commit dropbear

          	# Set timezone to China
          	uci set system.@system[0].timezone='CST-8'
          	uci set system.@system[0].zonename='Asia/Shanghai'
          	uci commit system

          	# Disable firewall WAN blocking (for now - re-enable after setup)
          	uci set firewall.@zone[1].input='ACCEPT'
          	uci set firewall.@zone[1].forward='ACCEPT'
          	uci commit firewall

          	exit 0
          	UCIEOF
          	chmod +x files/etc/uci-defaults/99-vs010-custom

          	# Patch board.d/02_network
          sed -i '/^[[:space:]]*cmcc,mr3000d-ci/i\	unicom,vs010|\\' target/linux/qualcommax/ipq50xx/base-files/etc/board.d/02_network

      - name: Configure build
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq50xx=y
          CONFIG_TARGET_qualcommax_ipq50xx_DEVICE_unicom_vs010=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_ATH11K_MEM_PROFILE_256M=y
          EOF
          make defconfig

      - name: Build OpenWrt
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: vs010-openwrt-firmware
          path: |
            openwrt/bin/targets/qualcommax/ipq50xx/*vs010*
            openwrt/build.log

      - name: Show build summary
        if: always()
        run: |
          echo "=== Build Result ==="
          ls -lh openwrt/bin/targets/qualcommax/ipq50xx/*vs010* 2>/dev/null || echo "No firmware found"
          echo ""
          echo "=== Build Log (last 50 lines) ==="
          tail -50 openwrt/build.log 2>/dev/null || echo "No build log"
